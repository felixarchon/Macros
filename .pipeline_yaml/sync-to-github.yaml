trigger:
  - main # or whichever branches you want to sync

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: github-sync-secrets # The name of your Variable Group

steps:
- checkout: self
  fetchDepth: 1 # Get full history from Azure DevOps
  persistCredentials: true

- script: |
    # Add GitHub as a remote
    git remote add github https://$(GitHub_PAT)@github.com/felixarchon/Macros.git
    
    # IMPORTANT: Fetch the GitHub repo so the agent knows what it's overwriting
    # This often solves the "expected object" error because it fills the local cache
    git fetch github main
    
    # Push the AzDO HEAD to GitHub main
    # --force-with-lease is safer, but --force is fine for a mirror sync
    git push github main
  displayName: 'Hard Sync to GitHub'