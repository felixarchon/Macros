trigger:
  - main # or whichever branches you want to sync

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: github-sync-secrets # The name of your Variable Group

steps:
- checkout: self
  persistCredentials: true # Vital: Allows the script to use the AzDO token

- script: |
    git remote add github https://$(GitHub_PAT)@github.com/felixarchon/Macros.git

    # We use --no-thin to prevent the 'index-pack' error
    # and --force to overwrite the existing GitHub history
    git push github HEAD:main --force --no-thin
  displayName: 'Sync main to GitHub'