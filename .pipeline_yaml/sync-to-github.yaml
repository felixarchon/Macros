trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: github-sync-secrets

steps:
- checkout: self
  fetchDepth: 0 # Keeping full history ensures a smooth link between repos
  persistCredentials: true

- script: |
    # 1. Add the GitHub remote
    git remote add github https://$(GitHub_PAT)@github.com/felixarchon/Macros.git
    
    # 2. Push HEAD to main
    # This maps your current commit directly to the GitHub main branch.
    # We remove --force so it only pushes if the histories match up.
    git push github HEAD:main
  displayName: 'Steady State Sync'